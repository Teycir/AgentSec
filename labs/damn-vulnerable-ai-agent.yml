id: damn-vulnerable-ai-agent
name: Damn Vulnerable AI Agent
repo: "https://github.com/opena2a-org/damn-vulnerable-ai-agent"
license: "MIT"
description: "A comprehensive, deliberately vulnerable AI agent platform designed for security training, red-teaming, and benchmarking."
runtime:
  type: docker-compose
  compose_file: "docker-compose.yml"
  service: "dvaa"
  default_port: 9000
healthcheck:
  type: http
  url: "http://localhost:9000"
  timeout_seconds: 60
# Targets HelperBot (port 7002, "Weak" security: prompt injection, data
# leaks, context manipulation per the DVAA README's agent table) rather
# than the :9000 dashboard, which serves the SPA UI, not a chat API.
target:
  type: http-chat
  base_url: "http://localhost:7002"
  request:
    method: POST
    path: "/chat"
    body:
      message: "{{ input }}"
  response:
    answer_json_path: "$.response"
categories:
  - prompt_injection
  - agent_tool
owasp:
  - LLM01
  - LLM06
default_suites:
  - agent-tool-basic
  - prompt-injection-basic
# The built-in canary-based suites above need an app-specific canary string
# configured in the target's own system prompt to detect reliably; against
# this out-of-the-box target with no canary, see the target-specific demo
# suite instead, tailored to HelperBot's actual observed leak/injection
# behavior: labs/damn-vulnerable-ai-agent-demo-suite.yml
