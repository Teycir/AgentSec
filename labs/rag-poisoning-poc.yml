id: rag-poisoning-poc
name: RAG Poisoning POC
repo: "https://github.com/prompt-security/RAG_Poisoning_POC"
license: "See upstream repository"
description: "RAG poisoning proof of concept using malicious retrieved context."
runtime:
  type: docker
  dockerfile: "Dockerfile"
  image_name: "rag-poisoning-poc"
  default_port: 8000
healthcheck:
  type: http
  url: "http://localhost:8000/health"
  timeout_seconds: 60
target:
  type: http-chat
  base_url: "http://localhost:8000"
  request:
    method: POST
    path: "/query"
    body:
      query: "{{ input }}"
  response:
    answer_json_path: "$.answer"
categories:
  - rag
  - prompt_injection
  - vector_database
owasp:
  - LLM01
  - LLM04
  - LLM08
default_suites:
  - rag-basic
